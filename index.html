<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canvas Platformer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="480"></canvas>
        
        <div id="hud">
            <div class="hud-item">WORLD <br><span id="hud-world">1-1</span></div>
            <div class="hud-item">LIVES <br>× <span id="hud-lives">3</span></div>
            <div class="hud-item">COINS <br>× <span id="hud-coins">00</span></div>
            <div class="hud-item">SCORE <br><span id="hud-score">000000</span></div>
            <div class="hud-item">HIGH SCORE <br><span id="hud-high">000000</span></div>
            <div class="hud-item">TIME <br><span id="hud-time">300</span></div>
        </div>

        <div id="menus">
            <div id="start-screen" class="menu screen active">
                <h1>SUPER BROWSER BROS</h1>
                <p>Press ENTER or Tap Here to Start</p>
                <div class="btn-group">
                    <button id="btn-fullscreen">Toggle Fullscreen</button>
                    <button id="btn-mute">Mute: OFF</button>
                </div>
            </div>
            <div id="pause-screen" class="menu screen">
                <h1>PAUSED</h1>
                <p>Press ESC or Tap to Resume</p>
            </div>
            <div id="game-over-screen" class="menu screen">
                <h1>GAME OVER</h1>
                <p>Press ENTER or Tap to Restart</p>
            </div>
            <div id="level-complete-screen" class="menu screen">
                <h1>LEVEL COMPLETE!</h1>
                <p>Loading next level...</p>
            </div>
            <div id="victory-screen" class="menu screen">
                <h1>YOU WIN!</h1>
                <p>Thanks for playing!</p>
                <p>Press ENTER to Restart</p>
            </div>
        </div>

        <div id="mobile-controls">
            <div class="d-pad">
                <button id="btn-left">◀</button>
                <button id="btn-right">▶</button>
            </div>
            <div class="action-pad">
                <button id="btn-action">FIRE</button>
                <button id="btn-jump">JUMP</button>
            </div>
        </div>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/level.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
